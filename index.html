<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workbook</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome To The Stream Chat!</h1>
    </header>
    <div class="webcam-container">
        <div class="webcam-frame">
            <img src="./IMG/Streamer.gif" alt="Streamer">
        </div>
    </div>

    <div class="stim-container">
        <input type="checkbox" id="stim-toggle" class="stim-toggle">
        <label for="stim-toggle" class="wow-button">wow</label>
        <div class="stim-content">
            <img src="./IMG/Stim.gif" alt="Stim">
        </div>
    </div>

    <div class="folder-container">
        <input type="checkbox" id="folder-toggle" class="folder-toggle">
        <label for="folder-toggle" class="folder-icon">
            <img src="./IMG/Folder.png" alt="workbook.exe">
            <span>workbook.exe</span>
        </label>
        <nav class="folder-content">
            <a href="./Week 1/index.html">Week 1</a>
            <a href="./Week 2/index.html">Week 2</a>
            <a href="./Week 3/index.html">Week 3</a>
        </nav>
